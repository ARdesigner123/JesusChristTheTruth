<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Jesus Christ The Truth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="static/login.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <video id="bg-video" loop muted src="static/jesusIntro.mp4"></video>

    <div id="intro-overlay">
        <div id="start-screen">
            <p>Click anywhere to begin</p>
        </div>
        
        <div id="bible-reference">Revelation 22:13 (NKJV)</div>

        <div id="text-sequence"></div>
        
        <svg class="cracks-svg" id="cracks-svg" preserveAspectRatio="none" viewBox="0 0 100 100">
            <path d="M50,50 L45,45 L48,35 L40,25 L45,15 L35,0 M48,35 L35,30 L30,20" />
            <path d="M50,50 L55,40 L52,30 L65,25 L70,10 L80,0 M65,25 L75,35 L90,30" />
            <path d="M50,50 L40,55 L45,65 L30,70 L25,85 L10,100 M45,65 L35,80 L20,85" />
            <path d="M50,50 L60,55 L55,65 L70,75 L65,90 L85,100 M70,75 L85,80 L95,70 M55,65 L50,85 L60,95" />
            <path d="M50,50 L35,48 L25,55 L10,45 L0,50 M50,50 L65,52 L75,45 L90,55 L100,50" />
        </svg>

        <div id="shatter-container"></div>
    </div>

    <div id="lightning"></div>

    <div id="main-ui" class="hidden">
        
        <div class="title-wrapper">
            <div class="custom-cross" id="cross-container">
                <div class="cross-vertical"></div>
                <div class="cross-horizontal"></div>
                </div>
            <h1 class="main-title">Jesus Christ The Truth</h1>
        </div>

        <div class="auth-container">
            <div class="toggle-buttons">
                <button id="btn-login" class="ancient-btn active">Login</button>
                <button id="btn-register" class="ancient-btn">Register</button>
            </div>

            <form id="auth-form" class="ancient-form">
                <h2 id="form-title">Login to Your Account</h2>
                
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div id="auth-message" class="auth-message"></div>

                <button type="submit" id="submit-btn" class="submit-btn">Login</button>
            </form>
        </div>

        <footer class="footer">
            <span class="bible-icon">📖</span>
            <p>© 2026 Jesus Christ The Truth. All Rights Reserved.</p>
        </footer>
    </div>

    <script src="static/login.js"></script>
</body>
</html>
