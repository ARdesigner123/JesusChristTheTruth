<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Rank - Jesus Christ The Truth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cardo:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <section class="profile-section">
        <div class="profile-container">
            <h1 class="main-title" style="font-size: 2.2rem;"><i class="fas fa-crown"></i> Your Rank</h1>
            <p class="description">Grow in faith and climb the biblical ranks.</p>
            
            <div class="current-rank-display">
                <h2>Current Level: <span style="color: #00e5ff;">Seeker</span></h2>
            </div>

            <div class="rank-path">
                <div class="rank-step current">
                    <i class="fas fa-search rank-icon"></i>
                    <div class="rank-info"><strong>Seeker</strong> <br><span>Your journey begins here.</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-pray rank-icon"></i>
                    <div class="rank-info"><strong>Believer</strong> <br><span>Locked</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-shoe-prints rank-icon"></i>
                    <div class="rank-info"><strong>Follower</strong> <br><span>Locked</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-sheep rank-icon"></i>
                    <div class="rank-info"><strong>Sheep</strong> <br><span>Locked</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-book-open rank-icon"></i>
                    <div class="rank-info"><strong>Disciple</strong> <br><span>Locked</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-hands-helping rank-icon"></i>
                    <div class="rank-info"><strong>Servant</strong> <br><span>Locked</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-hammer rank-icon"></i>
                    <div class="rank-info"><strong>Worker</strong> <br><span>Locked</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-bullhorn rank-icon"></i>
                    <div class="rank-info"><strong>Witness</strong> <br><span>Locked</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-user-tie rank-icon"></i>
                    <div class="rank-info"><strong>Elder</strong> <br><span>Locked</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-staff-snake rank-icon"></i>
                    <div class="rank-info"><strong>Shepherd</strong> <br><span>Locked</span></div>
                </div>
                <div class="rank-step locked">
                    <i class="fas fa-cross rank-icon"></i>
                    <div class="rank-info"><strong>Apostle</strong> <br><span>Locked (Highest Rank)</span></div>
                </div>
            </div>

            <a href="profile.html" class="profile-btn" style="margin-top: 20px; display: inline-block;">Back to Profile</a>
        </div>
    </section>

    <script src="static/script.js"></script>
</body>
</html>
